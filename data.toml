[e5]
name = "Charles Strickland‐Constable"
institution = "University of Hertfordshire"
date = 2021-02-17T15:00:00
title = "Generalised geodesics: the geometry of strings and branes"
location = "https://herts-ac-uk.zoom.us/j/95781725839"
abstract = "I will present recent work showing how the classical solutions of string and membrane sigma models can be understood as the analogue of integral curves of auto‐parallel vector fields in generalised geometry.<p>I will try to make the first part of the talk accessible to a non‐string‐theory audience."

[e6]
name = "<span lang='it'>Tommaso Franzini</span>"
title = "An introduction to Thermodynamic Bethe Ansatz with some applications"
institution = "University of Hertfordshire"
date = 2021-02-24T15:00:00
location = "https://herts-ac-uk.zoom.us/j/95781725839"
abstract = "Since the Thermodynamic Bethe Ansatz was first introduced, it has always been a powerful tool to investigate several properties of integrable quantum field theories. In this talk I will give an introduction to the topic, explaining a general method to derive the TBA equations and focusing on some of their most relevant aspects. In this context, I will also present the work I have done for my master thesis about the structure of the TBA for a theory with quantum group symmetry, as part of a collaboration with <abbr title='Professor'>Prof.</abbr> Ravanini from Bologna University and <abbr title='Professor'>Prof.</abbr> Ahn from Ewha University."

[e7]
name = "<span lang='pt'>Guilherme Almeida</span>"
institution = "<span lang='it'>Scuola Internazionale Superiore di Studi Avanzati</span>"
date = 2021-05-05T15:00:00
location = "https://herts-ac-uk.zoom.us/j/95781725839"
title = "An overview of Dubrovin Frobenius manifolds"
abstract = "Dubrovin Frobenius manifold is a geometric interpretation of a remarkable system of differential equations, called <abbr title='Witten–Dĳkgraaf–Verlinde–Verlinde'>WDVV</abbr> equations. Since the beginning of the nineties, there has been a continuous exchange of ideas from fields that are not trivially related to each other, such as: Topological quantum field theory, non‐linear waves, singularity theory, random matrices theory, integrable hierarchies of <abbr title='Korteweg–de Vries'>KdV</abbr> type, and Painlevé equations. Dubrovin Frobenius manifolds theory is the bridge between them. <p>In the first part of the talk, I will review the notion of Dubrovin Frobenius manifolds and its relationship with finite reflection groups and its extensions, isomonodromic deformation equations and Integrable hierarchy of <abbr title='Korteweg–de Vries'>KdV</abbr> type. In the second part of the seminar, I will review the differential geometry of Orbit spaces of reflection groups and its extensions, which are one of the main examples of Dubrovin Frobenius manifolds. Thereafter, I will present a new extension of finite reflection group, which its orbit space has a Dubrovin Frobenius structure. This work is based on the papers <a href='https://arxiv.org/pdf/1907.01436.pdf'>arXiv:1907.01436</a> and <a href='https://arxiv.org/pdf/2004.01780.pdf'>arXiv:2004.01780</a>."

[e8]
name = "Luigi Alfonsi"
institution = "Queen Mary University of London"
date = 2021-05-12T15:00:00
title =  "Towards an extended/higher correspondence – generalised geometry, bundle gerbes and global <math><mi>𝑇</mi></math>‐duality"
location = "https://herts-ac-uk.zoom.us/j/95781725839"
abstract = "Extended Geometry is the geometric framework which makes <math><mi>𝑇</mi></math>‐duality and <math><mi>𝑈</mi></math>‐duality manifest symmetries. This is realised by lifting generalised geometry to a higher dimensional space which is, at least locally, the space underlying the fundamental representation of the duality group. However, despite its relevance in M‐theory, the global aspects of Extended Geometry are still unclear. <p>I propose a global formulation of Extended Geometry via a generalisation of Kaluza–Klein principle which unifies a metric and a higher gauge field on a categorified principal bundle (e.g. a bundle gerbe). I will illustrate the relation of this formulation with usual generalised geometry and with the string <math><mi>𝜎</mi></math>‐model. Finally, I will discuss how a global notion of generalised fluxes (geometric and non‐geometric) emerges from this picture and how this is related to a higher gauge theory with the string 2‐group."

[e8a]
name = "Robert Gray"
institution = "University of East Anglia"
title = "Undecidability of the word problem for one‐relator inverse monoids via right‐angled Artin subgroups of one‐relator groups"
date = 2021-05-26T15:00:00
location = "https://herts-ac-uk.zoom.us/j/92172057379?pwd=TEhRU0Y5clVNRU5rRzZhM09BWDJBZz09"
abstract = " It is a classical result of Magnus proved in the 1930s that the word problem is decidable for one‐relator groups. This result inspired a series of investigations of the word problem in other one‐relator algebraic structures. For example, in the 1960s Shirshov proved the word problem is decidable in one‐relator Lie algebras. In contrast, it remains a longstanding open problem whether the word problem is decidable for one‐relator monoids. An important class of algebraic structures lying in between monoids and groups is that of inverse monoids. In this talk I will speak about a recent result which shows that there exist one‐relator inverse monoids of the form <math><mi mathvariant='normal'>Inv</mi><mo>⟨</mo><mi>𝐴</mi><mo>|</mo><mi>𝑤</mi><mo>=</mo><mn>1</mn><mo>⟩</mo></math> with undecidable word problem. This answers a problem originally posed by Margolis, Meakin and Stephen in <time datetime='1987'>1987</time>. I will explain how this result relates to the word problem for one‐relator monoids, the submonoid membership problem for one‐relator groups, and to the question of which right‐angled Artin groups arise as subgroups of one‐relator groups."

[e9]
name = "Severin Bunk"
institution = "University of Oxford"
date = 2021-12-07T16:30:00
title = "Symmetries of gerbes, anomalies, and topology"
abstract = "Gerbes are geometric objects which describe the third integer cohomology of a manifold and the <math><mi>𝐵</mi></math>‐field in string theory. Infinitesimal symmetries of gerbes on a manifold <math><mi>𝑀</mi></math> are associated with algebroids on <math><mi>𝑀</mi></math>. In this talk, we instead investigate finite symmetries of gerbes; we demonstrate how in the presence of a Lie group action on <math><mi>𝑀</mi></math>, a gerbe on <math><mi>𝑀</mi></math> induces an extension of the acting Lie group by a 2‐group. These extensions have various applications: they contain all information about equivariant structures on gerbes, explain non‐associative magnetic translations, describe anomalies in <abbr title='quantum field theories'>QFTs</abbr> in odd dimensions, and give rise to new models for the string group."

[e10]
date = 2022-03-09T13:30:00
name = "<span lang='zh-Latn-pinyin'>Congkao Wen</span> <span lang='zh-cn'>温从烤</span>"
institution = "Queen Mary University of London"
title="Integrated correlators in <math><mi>𝒩</mi><mo>=</mo><mn>4</mn></math> super Yang–Mills"
abstract = "In this talk, I will present an exact expression for an integrated correlator of four <abbr title='Bogomolʼnyi–Prasad–Sommerfield'>BPS</abbr> operators in <math><mi>𝒩</mi><mo>=</mo><mn>4</mn></math> supersymmetric Yang–Mills (<abbr title='supersymmetric Yang–Mills'>SYM</abbr>) with any classical gauge group <math><msub><mi>𝐺</mi><mi>𝑁</mi></msub></math>. I will show that this can be expressed as a simple two‐dimensional lattice sum, which is a function of <math><mi>𝑁</mi></math> and of the complex Yang–Mills coupling <math><mi>𝜏</mi><mo>=</mo><mi>𝜃</mi><mo>/</mo><mn>2</mn><mi>π</mi><mo>+</mo><mi mathvariant='normal'>i</mi><mn>4</mn><mi>π</mi><mo>/</mo><msubsup><mi>𝑔</mi><mtext>YM</mtext><mn>2</mn></msubsup></math>. This expression contains infinite orders of perturbative and non‐perturbative instanton terms, and manifests the Goddard–Nuyts–Olive duality of <math><mi>𝒩</mi><mo>=</mo><mn>4</mn></math> <abbr title='supersymmetric Yang–Mills'>SYM</abbr>. Furthermore, the integrated correlator satisfies a striking ‘Laplace difference’ equation, which determines the integrated correlator for all classical gauge groups in terms of the <math><mi>SU</mi><mo>(</mo><mn>2</mn><mo>)</mo></math> correlator. I will also comment on matching our result with the standard Feynman diagram computation, and the relation to four‐graviton amplitude in type ⅡB superstring in <abbr title='anti de Sitter'>AdS</abbr> space."

[e11]
name = "<span lang='it'>Pietro Benetti Genolini</span>"
institution = "King’s College London"
date = 2022-03-24T13:30:00
title = "Localization of the action in <abbr title='anti de Sitter'>AdS</abbr>/<abbr title='conformal field theory'>CFT</abbr>"
abstract = "I will introduce a simple formula for the action of supersymmetric solutions to minimal gauged supergravity in the context of the <abbr title='anti de Sitter'>AdS</abbr>/<abbr title='conformal field theory'>CFT</abbr> correspondence. Such solutions are equipped with a Killing vector, and I will show that the holographically renormalized action may be expressed entirely in terms of the weights of this vector field at its fixed points, together with certain topological data. In this sense, the classical gravitational partition function localizes in the bulk, and depends only on the topology of the fixed point set."
location = "https://meet.google.com/vxh-xvkt-knj"

[e12]
name = "Atul Sharma"
institution = "University of Oxford"
date = 2022-04-06T13:30:00
title = "Twistors, gravity and celestial holography"
abstract = "I will describe a 2‐dimensional sigma model that is dual to self‐dual <abbr title='general relativity'>GR</abbr> in 4‐dimensional flat space. Our sigma model governs holomorphic maps from the Riemann sphere to twistor space. Semiclassical correlators of the model take us beyond self‐dual <abbr title='general relativity'>GR</abbr> and give rise to Hodges’ formula for tree‐level <abbr title='maximally helicity‐violating'>MHV</abbr> graviton amplitudes. Whereas its 2d <abbr title='operator product expansion'>OPE</abbr> algebra reproduces the infinite‐dimensional <math><msub><mi>𝑤</mi><mrow><mn>1</mn><mo>+</mo><mo>∞</mo></mrow></msub></math> algebra recently discovered by Strominger to be the symmetry algebra of celestial holography.This talk is based on the works <a href='https://arxiv.org/abs/2103.16984'>arXiv:2103.16984</a> and <a href='https://arxiv.org/abs/2110.06066'>arXiv:2110.06066</a>."
location = "https://meet.google.com/ara-suqn-pwb"

[e13]
name = "<span lang='de'>Alexander Schenkel</span>"
date = 2022-04-20T13:30:00
institution = "University of Nottingham"
title = "<abbr title='Batalin–Vilkovisky'>BV</abbr> and <abbr title='Batalin–Fradkin–Vilkovisky'>BFV</abbr> formalism beyond perturbation theory"
abstract = "Modern approaches to quantum field theory, such as factorization algebras and homotopical <abbr title='algebraic quantum field theory'>AQFT</abbr>, are based on cohomological methods in field theory that have been developed over the past decades in the context of the <abbr title='Batalin–Vilkovisky'>BV</abbr> and <abbr title='Batalin–Fradkin–Vilkovisky'>BFV</abbr> formalisms. While these techniques work pretty well for perturbative quantum field theories, they have intrinsic limitations to describe global features, such as the topology of the gauge group or moduli of bundles. Derived algebraic geometry is a powerful geometric framework in which one can attempt to globalize the <abbr title='Batalin–Vilkovisky'>BV</abbr> and <abbr title='Batalin–Fradkin–Vilkovisky'>BFV</abbr> formalisms. I will start this talk with a very basic introduction to derived algebraic geometry, focussing in particular on its more concrete and computational aspects. I will then illustrate the power and potential of this framework for new developments in mathematical physics by studying two applications: <ol><li>The non‐perturbative <abbr title='Batalin–Vilkovisky'>BV</abbr> formalism for a function <math><mi>𝑓</mi><mo>:</mo><mo>[</mo><mi>𝑋</mi><mo>∕</mo><mi>𝐺</mi><mo>]</mo><mo>→</mo><mi>𝑘</mi></math> on a quotient stack, and</li> <li>the quantization of a derived cotangent stack <math><msup><mi mathvariant='normal'>T</mi><mo>∗</mo></msup><mo>[</mo><mi>𝑋</mi><mo>∕</mo><mi>𝐺</mi><mo>]</mo></math> over a quotient stack, which is a global version of BFV quantization.</li></ol>This talk is based on joint works with <a href='https://arxiv.org/abs/2104.14886'>Benini and Safronov [2104.14886]</a> and <a href='https://arxiv.org/abs/2201.10225'>Benini and Pridham [2201.10225]</a>."
location = "https://meet.google.com/zyo-mrpi-rfs"

[e14]
name = "Brian R. Williams"
institution = "University of Edinburgh"
date = 2022-05-25T13:30:00
location = "https://herts-ac-uk.zoom.us/j/94937819268"
title = "A holomorphic approach to fivebranes"
abstract = "In almost all situations, the twist of a supersymmetric <abbr title='quantum field theory'>QFT</abbr> has the structure of a holomorphic <abbr title='quantum field theory'>QFT</abbr>. I’ll review general aspects of holomorphic <abbr title='quantum field theory'>QFT</abbr> while drawing parallels to the familiarsituation of chiral <abbr title='conformal field theory'>CFT</abbr>. I will then define a holomorphic model which wepropose describes the minimal twist of the six‐dimensional superconformal theory associated to the Lie algebra <math><mi>𝔰𝔩</mi><mo>(</mo><mn>2</mn><mo>)</mo></math>. A primary source of evidence forthis proposal is via an approach to holography in the twisted setting using Koszul duality."

[e15]
date = 2022-06-01T12:30:00
name = "<span lang='pl'>Katarzyna Anna Rejzner</span>"
institution = "University of York"
title = "Symmetries in mathematical perturbative quantum field theory"
abstract = "In this talk I will give an overview of (perturbative) algebraic quantum field theory and explain how it can be applied to describe interacting <abbr title='quantum field theory'>QFT</abbr> models. I will then report on new progress in the description of renormalization group and symmetries, using nets of C*‐algebras."
location = "https://meet.google.com/qsr-oqjn-dsj"

[e16]
date = 2022-09-07T13:30:00
name = "<span lang='de'>Christian Sämann</span>"
institution = "Heriot‐Watt University / <span lang='gd'>Oilthigh Heriot‐Watt</span>"
title = "<math><mi>𝑇</mi></math>‐duality with categorified principal bundles"
abstract = "The data appearing in the Buscher rules for <math><mi>𝑇</mi></math>‐duality, the Kalb–Ramond field and the metric, can be unified to a connection on a categorified principal bundle governing all geometric T‐dualities. Interestingly, this picture allows for a direct extension to <math><mi>𝑇</mi></math>‐dualities involving non‐geometric backgrounds. Before explaining all this, I will give a gentle introduction to categorified principal bundles. <a href='2022-09-07-Sämann.pdf'>(slides)</a>"

[e17]
name = "Emily Cliff"
institution = "Université de Sherbrooke"
date = 2022-11-16T13:30:00
title = "Higher symmetries: smooth 2‐groups and their principal bundles"
abstract = "A 2‐group is acategorical generalization of a group: it’s a category with a multiplication operation which satisfies the usual group axioms only up to coherentisomorphisms. In this talk I will introduce the category of Lie groupoids and bibundles between them, in order to provide the definition of a smooth 2‐group. I will define principal bundles for such a smooth 2‐group and provide classification results that allow us to compare them to principal bundles for ordinary groups. I will conclude with some potential applications of these ideas to various areas, including string geometry, Chern–Simons theory, and equivariant elliptic cohomology. This talk is based on joint work with Dan Berwick‐Evans, Laura Murray, Apurva Nakade, and Emma Phillips. I will not assume any previous background on 2‐groups or Lie groupoids."

[e18]
date = 2022-11-30T13:30:00
name = "<span lang='sk'>Fridrich Valach</span>"
institution = "Imperial College London"
title = "<math><mi>𝐺</mi></math>‐algebroids, embedding tensors, and Poisson–Lie duality"
abstract = "I will describe a class of structures, known as <math><mi>𝐺</mi></math>‐algebroids, which arises as a natural generalisation of the ordinary, generalised, and exceptional tangent bundles from ordinary, generalised, and exceptional geometry, respectively. I will discuss aclassification result in the exceptional case and show how to obtain the possible fluxes/twists of the bracket. In the M‐theory and ⅡB setups, the twists organise themselves naturally into connections and covariantly constant differential forms, while in the ⅡA case one in particular recovers both the Romans mass and the deformation of Howe–Lambert–West. Finally, I will show how to use these algebroids to answer a question about the realisability of embedding tensors (providing a new perspective on the result of Inverso ’17) and to give a joint description of the Poisson–Lie <math><mi>𝑇</mi></math>‐ and <math><mi>𝑈</mi></math>‐duality. This is ajoint work with M. Bugden, O. Hulik, and D. Waldram."

[e19]
date = 2022-11-24T16:30:00
name = "<span lang='sv'>Nils Martin Sten Cederwall</span>"
institution = "<span lang='sv'>Chalmers tekniska högskola</span>"
title = "Supersymmetry and Koszul duality"
abstract = "The pure spinor superfield formalism is a very general method to construct supermultiplets, and in certain cases, Batalin—Vilkovisky actions for them, using extra variables inthe form of constrained spinors. The main focus has typically been on thecircumvention of old “no‐go theorems” against manifestly supersymmetric off‐shell formulation of maximally supersymmetric models, such as <math><mi>𝐷</mi><mo>=</mo><mn>10</mn></math> super‐Yang—Mills theory and <math><mi>𝐷</mi><mo>=</mo><mn>11</mn></math> supergravity. In this talk, I will briefly review the formalism, and then describe how the constrained spinors are Koszuldual to certain superalgebras, generically <math><msub><mi>𝐿</mi><mo>∞</mo></msub></math> algebras, constructed fromthe supermultiplets, and how these algebras introduce non‐linear structures on the supermultiplets. This is work in collaboration with <span lang='sv'>S. Jonsson</span>, <span lang='sv'>J. Palmkvist</span> and I. Saberi."

[e20]
name = "<span lang='yue-Latn'>Cheuk Yu Mak</span> <span lang='yue-Hant'>麥焯如</span>"
institution = "University of Southampton"
date = 2023-02-22T13:30:00
title = "Quantum cohomology and loop group action"
abstract = "Quantum cohomology is an invariant of symplectic manifolds. It is a commutative deformation of theusual cohomology as an algebra, where the deformation is controlled by counting certain holomorphic spheres. In this talk, we will first explain how it is related to the loop space, and to Floer cohomology. Then we will sketch that,in the presence of a Hamiltonian <math><mi>𝐺</mi></math>‐action on a symplectic manifold <math><mi>𝑀</mi></math> with acompact Lie group <math><mi>𝐺</mi></math>,  how we can obtain an action on the <math><mi>𝐺</mi></math>‐‐equivariant quantum cohomology from the <math><mi>𝐺</mi></math>‐equivariant Borel–Moore homology of the based loop space of <math><mi>𝐺</mi></math>. No knowledge on symplectic geometry is assumed. This is a joint work with <span lang='es'>Eduardo González</span> and Dan Pomerleano."

[e21]
name = "Arthur Lipstein"
institution = "Durham University"
date = 2023-03-22T16:00:00
title = "From amplitudes to cosmology"
abstract = "Whereas scattering amplitudes probe physics at the shortest distances, cosmology probes physics at the largest scales. Nevertheless, many concepts discovered in the study of scattering amplitudes generalise to cosmological observables. In this talk I will describe some aspects of this program which I have recently been investigating such as the double copy, scattering equations, and soft limits, and will discuss how these directions are interrelated."

[e22]
name = "James Waldron"
institution = "University of Newcastle"
date = 2023-03-29T13:30:00
title = "Skew Hecke Algebras"
abstract = "Given a finite group <math><mi>𝐺</mi></math>, a subgroup <math><mi>𝐻</mi></math>, and an action of <math><mi>𝐺</mi></math> on an algebra <math><mi>𝐴</mi></math>, we define an associated ‘skew Hecke algebra’. This construction provides a simultaneous generalisation of Hecke algebras of finite groups and of skew group algebras. I will explain some of the basic properties of these algebras, some results about their structure, and the relation to rings of invariants. I will also discuss the representation theory of these algebras and their homological properties such as global dimension. If there is time I will explain the relevance of these algebras to the study of quantum reference frames, and possible analogues of skew Hecke algebras for von Neumann algebras. This is based on work inprogress, joint with Leon Loveridge (University of South‐Eastern Norway) and <span lang='pl'>Jan Głowacki</span> (PAN Centre for Theoretical Physics, Warsaw)."

[e23]
name = "Lewis Napper"
institution = "University of Surrey"
date = 2023-04-26T13:30:00
title = "Monge–Ampère Geometry and the Navier–Stokes equations"
abstract = "Partial differential equations of Monge–Ampère type have been shown to correspond to specific choices of differential form on the associated phase space. Furthermore, Lagrangian submanifolds of said space may be viewed as a generalisation of solutions to a Monge–Ampère equation. Building from the observation that the Poisson equation for the pressure of an incompressible, two‐dimensional, Navier–Stokes flow can be presented as an equationof Monge–Ampère type, this talk introduces a framework for studying fluid dynamics using properties of the aforementioned submanifolds. In particular, it is noted that such a submanifold may be equipped with a metric whose signature acts as a diagnostic for the dominance of vorticity and strain. We discuss how this approach may be extended to fluid flows on an arbitrary Riemannian manifold and to higher dimensions, through the use of higher (categorified) symplectic geometry. We conclude with some comments on how this facilitates symmetry reductions and some open questions."

[e24]
name = "Chandramouli Chowdhury"
institution = "University of Southampton"
date = 2025-09-24T15:00:00
location = "B404"
title = "Cosmological Graphs from Scattering Amplitudes"
abstract = "We analyze cosmological (in-in) correlators and the wave function of the universe in dS at tree and loop levels. We demonstrate a hidden simplicity in the structure of in-in correlators arising by adding various building blocks, which allows us to obtain a new integral representation for the in-in correlators in terms of scattering amplitudes in flat space. Therefore, enabling us to study cosmological graphs by exploiting amplitude tools and derive new relations for in-in correlators. Since dS wave functions are equivalent to AdS correlators by analytic continuation, a part of the analysis is also valid for AdS correlators. <a href='2025-09-24-Chowdhury.pdf'>(slides)</a>"

[e25]
name = "Ben Gripaios"
institution = "University of Cambridge"
date = 2025-11-26T15:00:00
location = "B404"
title = "Varieties of gauge theories"
abstract = "I will describe the use of methods of arithmetic geometry to find gauge theories in 4 dimensions that are free of anomalies. In many cases, it is possible to find all such theories."

[e26]
name = "Chettha Saelim"
institution = "University of Surrey"
date = 2025-11-19T15:00:00
location = "B404"
title = "Extremal Black Holes from Homotopy Algebras"
abstract = "While strong uniqueness theorems hold for stationary, asymptotically flat black holes in four dimensions, the results break down in higher dimensions and when the asymptotically flat condition is relaxed. Nonetheless, there has been significant progress in classifying the near-horizon geometries of extremal black holes. Motivated by this, we start with near-horizon geometries, which are better understood, and deform them to obtain extremal black hole solutions.  We investigate whether a given near-horizon geometry uniquely corresponds to a black hole solution or if there are multiple black holes with the same near-horizon geometry. Our approach employs the homotopy algebraic framework, a powerful and increasingly influential framework in both classical and quantum field theory. Using homological perturbation theory, we recursively solve the deformation problem order by order. To illustrate the method, we present a concrete example of the deformation of the extremal Kerr horizon. <a href='2025-11-19-Saelim.pdf'>(slides)</a>"

[e27]
name = "Chris White"
institution = "Queen Mary University of London"
date = 2025-12-03T15:00:00
location = "B404"
title = "The magic of scattering amplitudes"
abstract = "In recent years, a growing community of researchers have been applying ideas from Quantum Information / Computing theory to high energy physics. Entanglement is one such quantity, but there are by now many others. This talk will examine the property of “magic” (also known as “non-stabliserness”) which, roughly speaking, measures whether quantum systems have a genuine computational advantage over their classical counterparts. I will review the origin of this concept, before describing recent applications from both collider physics and scattering amplitudes research. No prior knowledge of quantum computing will be assumed. <a href='2025-12-03-White.pdf'>(slides)</a>"

[e28]
name = "Rishi Mouland"
institution = "Imperial College London"
date = 2025-10-08T13:00:00
location = "B400"
title = "Extremal Couplings and Gluons in AdS/CFT"
abstract = "In AdS/CFT, extremal couplings induce a mixing between single- and double-trace operators. I will diagnose this mixing and compute it coefficient using the conformal block expansion of 4-point Witten diagrams involving extremal couplings. I will then study the simplest dual pair in which such couplings arise: 4d N=2 theories dual to AdS5 x S5 with some 7-branes. Summing a tower of extremal Witten diagrams provides the final piece of the gluon 4-point function to order 1/N^2.  <a href='2025-10-08-Mouland.pdf'>(slides)</a>"

[e29]
name = "Falk Hassler"
institution = "University of Wrocław"
date = 2025-10-15T15:00:00
location = "B404"
title = "Strings, Membranes, and a Hidden Symmetry Algebra in Quantum Gravity"
abstract = "Geometry underpins gravity, while the quantum world is governed by algebras of observables. In string theory, (super)gravity and its quantum corrections emerge from specific vibration modes of relativistic strings, described by vertex operator algebras in two-dimensional conformal field theories. However, the precise map between these two is highly non-trivial and is only known explicitly to the first orders in a perturbative expansion. I will reveal a new, infinite-dimensional symmetry algebra that at least reproduces the leading two orders of quantum corrections. Remarkably, it has the potential to evade a no-go theorem that rules out competing approaches to uncover hidden symmetries in supergravity beyond second-order corrections. Given that many of the algebraic structures encountered here have a natural generalization from strings to membranes, this suggests a similar approach to analyzing quantum corrections in 11-dimensional supergravity - the low-energy limit of M-theory. Beyond fundamental insights, these results have broad applications, including the construction of new supergravity solutions, the analysis of their spectrum, the computation of renormalization group flows in two-dimensional σ-models, and the study of integrable strings. A generalization of Cartan geometry is found on the mathematical side."

[e30]
name = "Ines Aniceto"
institution = "University of Southampton"
date = 2025-11-05T15:00:00
location = "B404"
title = "Analytic approaches to the relativistic Boltzmann equation"
abstract = """The emergence of a universal pre-hydrodynamic attractor behaviour during fluid thermalisation is an important feature in the study of ultra-relativistic nuclear collisions and cold atom experiments: highly non-hydrodynamic behaviour dictated by initial conditions quickly decays towards this attractor solution, with the resulting hydrodynamic system independent of the initial state.

There are many approaches to study the emergence of this attractor. We will briefly review these approaches, then focusing on kinetic theory. Starting with the relativist Boltzmann equation in the so-called relaxation time approximation, we introduce a series of moments and their generating function, which we show solved a single PDE. We solve this PDE perturbatively for all moments, both in the small and large time approximations, and we then recover the free streaming and attractor regimes at each end via methods of analytic continuation."""

[e31]
name = "Jakub Opršal"
institution = "University of Birmingham"
date = 2025-12-10T15:00:00
location = "B404"
title = "A topological proof of the <math><mi>H</mi></math>-colouring dichotomy"
abstract = """A colouring of a graph with <math><mi>k</mi></math> colours is an assignment of colours to vertices so that no edge is monochromatic. As it is well-known colouring with 2 colours is in P while colouring with <math><mi>k &gt; 2</mi></math> colours is NP-complete. This dichotomy was extended to the <it>graph homomorphism problem</it>, also called <math><mi>H</mi></math>-colouring, by Hell and Nešetřil [J. Comb. Theory B, 48(1):92-110, 1990]. More precisely, they proved that deciding whether there is a graph homomorphism from a given graph to a fixed graph <math><mi>H</mi></math> is in P if <math><mi>H</mi></math> is bipartite (or contains a self-loop), and is NP-complete otherwise. This dichotomy served as an important test-case for the Feder–Vardi dichotomy conjecture, and Bulatov–Zhuk dichotomy of complexity of finite-template CSPs.
 
In the talk, I will present a new proof of this theorem using tools from topological combinatorics based on ideas of Lovász [J. Comb. Theory, Ser. A, 25(3):319-324, 1978] and Brower’s fixed-point theorem. This is joint work with Sebastian Meyer (TU Dresden)."""

[e32]
name = "Fabian Hahner"
institution = "University of Washington"
date = 2025-09-16T15:00:00
location = "SP3004"
title = "A supergeometric approach to (twisted) eleven-dimensional supergravity"
abstract = "I will present a geometric perspective on superspace that proves fruitful for studying twisted supergravity, especially in eleven dimensions. This allows for a uniform description of the eleven-dimensional theory and its twists in terms of homotopy Poisson-Chern-Simons theory on appropriate superspaces. If time permits, I will further discuss higher symmetries in twisted supergravity theories and how they hint towards interesting global structures."

[e33]
name = "Neil Lambert"
institution = "King's College London"
date = 2025-10-29T15:00:00
location = "B404"
title = "Quantum and Classical Properties of the Sen Acton for Self-Dual Fields"
abstract = "Sen has proposed a novel action for self-dual fields that has been generalised by Hull to include two metrics. The resulting theory has many novel features including two independent diffeomorphism-like symmetries. Furthermore the action is quadratic in the fields and as a result the path-integral can be can be computed. We will discuss various aspect of this theory in two-dimensions such as the partition function and  modular invariance. <a href='2025-10-29-Lambert.pdf'>(slides)</a>"

[e34]
name = "Mateo Galdeano"
institution = "University of Hertfordshire"
date = 2025-10-01T15:00:00
location = "B404"
title = "SW-algebras and G2-structures with torsion"
abstract = "Given a special holonomy manifold, we can obtain an associated superconformal algebra of symmetries (SW-algebra) by considering a string theory compactification. This is a fascinating correspondence between geometry and conformal field theory that has spectacular consequences: for instance, mirror symmetry was originally discovered this way! Although the correspondence is well understood for torsion-free G-structures and compactifications without fluxes, very little is known for more general G-structures in the presence of NS flux. In this talk I will present the first steps to identify these conformal algebras. We will do so through a study of the classical sigma model, focusing on the case of G2 manifolds. Time permitting, I will discuss how to reformulate these results in the language of Vertex Operator Algebras and present some explicit examples.\nThis talk is based on 2412.13904, joint with Xenia de la Ossa and Enrico Marchetto, and on 2502.02769, joint with Andoni de Arriba de la Hera and Mario Garcia-Fernandez. It also connects with some ongoing work with Leron Borsten and Hyungrok Kim. <a href='2025-10-01-Galdeano.pdf'>(slides)</a>"

[e35]
name = "Chris Hull"
institution = "Imperial College London"
date = 2025-10-22T15:00:00
location = "C408"
title = "A New Superstring Field Theory Action"
abstract = """Sen’s superstring field theory successfully formulates perturbative superstring theory but has a number of strange features.

The action is not fully background independent and it does not have standard diffeomorphism symmetry - instead there is an exotic gauge symmetry that acts on some fields but not others. 

These issues greatly restrict the spacetimes that this action can be applied to.

A new action is found that reduces to Sen’s in a certain limit but which has diffeomorphism symmetry together with further exotic symmetries and is background independent. As a result, it can be applied to any spacetime. <a href='2025-10-22-Hull.pdf'>(slides)</a>"""

[e36]
name = "Guillermo Arias-Tamargo"
institution = "Imperial College London"
date = 2025-11-12T15:00:00
location = "B404"
title = "Non-invertible symmetries in non-linear sigma models"
abstract = "Global symmetries can be generalised to transformations generated by topological operators, including cases in which the topological operator does not have an inverse. A family of such topological operators are intimately related to dualities via the procedure of half-space gauging. In this talk I will discuss the construction of non-invertible defects based on T-duality in two dimensions, generalising the well-known case of the free compact boson to any Non-Linear Sigma Model with Wess-Zumino term which is T-dualisable. I will also present several applications of this symmetry, which include the protection of some coupling constants of the sigma model from quantum corrections as well as new Ward identities. Time permitting, I'll discuss the target space interpretation of these defects, and their fate in String Theory.  <a href='2025-11-12-Arias-Tamargo.pdf'>(slides)</a>"

[e37]
name = "Joseph Smith"
institution = "University of Birmingham"
date = 2026-02-11T15:00:00
location = "B404"
title = "Non-Lorentzian Holography and Near-BPS Physics in String Theory"
abstract = "In recent years there has been a renewed interest in understanding string theory close to BPS bounds using the tools of non-Lorentzian physics. In these regimes the underlying geometry is deformed, becoming a generalisation of Newton-Cartan geometry based around a brane-like foliation of spacetime. By considering such limits on both sides of a Lorentzian holographic duality we can construct dualities between non-Lorentzian QFT and string theory on non-Lorentzian spacetimes, which in the IR reduces to solutions of exotic non-Lorentzian supergravity theories. In this talk I will show how these theories, along with their BPS brane solutions, can be constructed using the explicit example of the M5-brane limit of eleven-dimensional supergravity. We will apply these lessons to D-brane limits from the perspective of both the gravitational solution and the worldvolume QFT to construct proposals for non-Lorentzian holography. We will see that both limits exhibit the same symmetry structure as the gravitational solutions, with the QFT dynamics reducing to motion on the moduli space of solitons representing quarter-BPS brane bound states. Time-permitting, I will finish with a discussion of upcoming work on including quantum effects on the QFT side using the example of Galilean Yang-Mills, which is proposed to be dual to non-relativistic string theory on a near-horizon D2-brane background. <a href='2026-02-12-Smith.pdf'>(slides)</a>"

[e38]
name = "Yann Peresse"
institution = "University of Hertfordshire"
date = 2026-01-09T15:00:00
location = "E350"
title = "Semigroups Of Generalised Symmetries"
abstract = """Symmetry is a recurring concept in both Science and Art. Upon hearing the term, one initially tends to think of rotations and reflections found in Geometry. However, if we recall that, formally, the symmetries of a geometric shape <math><mi>X</mi></math> are just the distance preserving bijections <math><mi>f</mi><mo>:</mo><mi>X</mi> <mo>&rarr;</mo> <mi>X</mi></math>, then we see that this idea naturally generalises from Geometry to virtually all areas of Mathematics: The symmetries of any kind of mathematical object <math><mi>X</mi></math> are the bijections <math><mi>f</mi><mo>:</mo><mi>X</mi> <mo>&rarr;</mo> <mi>X</mi></math> which preserve the structure of <math><mi>X</mi></math>.

For example, the symmetries of a graph, group, or vector space are its automorphisms and the symmetries of a topological space its homeomorphisms. In each case, the symmetries of <math><mi>X</mi></math> form a subgroup of the symmetric group <math><mo>Sym</mo><mo>(</mo><mi>X</mi><mo>)</mo></math> of all permutations of <math><mi>X</mi></math>. By Cayley's Theorem, all groups are isomorphic to subgroups of symmetric groups, and so Group Theory is essentially the study of symmetries.

There are two widely-studied and natural generalisations of the concept of symmetry above which correspond to generalisations of groups to semigroups and inverse semigroups, respectively. First, one might drop the requirement that symmetries need to be invertible. For example, one might consider all continuous transformations of some topological space <math><mi>X</mi></math>. This takes us from subgroups of <math><mo>Sym</mo><mo>(</mo><mi>X</mi><mo>)</mo></math> to subsemigroups of the <i>Full Transformation Monoid</i> <math><mi>X</mi><mo><sup></mo><mi>X</mi></sup></math> of all functions from <math><mi>X</mi></math> to <math><mi>X</mi></math>.

Alternatively, one might be interested not just in the symmetries of the whole structure <math><mi>X</mi></math>, but also in partial symmetries, i.e. symmetries between substructures of <math><mi>X</mi></math>. This approach takes us to studying inverse subsemigroups of the <i>Symmetric Inverse Monoid</i> <math><mi>I</mi><sub><mi>X</mi></sub></math> consisting of all bijections between subsets of <math><mi>X</mi></math>.

In this talk, we will consider <math><mo>Sym</mo><mo>(</mo><mi>X</mi><mo>)</mo></math>, <math><mi>X</mi><mo><sup></mo><mi>X</mi></sup></math>, and <math><mi>I</mi><sub><mi>X</mi></sub></math> on an infinite set <math><mi>X</mi></math>. I will present a variety of results which highlight the connections between semigroups (including groups and inverse semigroups) on the one hand and Set Theory, Model Theory, and Topology on the other. No previous knowledge of Semigroup Theory will be assumed. <a href='2026-01-09-Peresse.pdf'>(slides)</a>"""

[e39]
name = "Rowan Wright"
institution = "University of Southampton"
date = 2026-01-21T16:00:00
location = "B404"
title = " Correlators of multiple light-like Wilson loops in N=4 supersymmetric Yang-Mills theory"
abstract = """Planar scattering amplitudes in N=4 super Yang-Mills theory are famously dual to the expectation values of null polygonal Wilson loops, and there has been much recent interest in studying closely related objects, such as a Wilson loop with a Lagrangian operator insertion. 

After presenting some motivation for studying such objects and reviewing amplitude-Wilson loop duality, I will present evidence that much of the same mathematical structure is also enjoyed by correlators of multiple loop operators. This includes very natural generalisations of the Q-bar equation and BCFW recursion relations, and expressions for one-loop leading singularities in terms of tree-level objects. <a href='2026-01-21-Wright.pdf'>(slides)</a>"""

[e40]
name = "Silvia Butti"
institution = "King's College London"
date = 2026-01-28T15:00:00
location = "B404"
title = "Optimal Inapproximability of Promise Equations over Finite Groups"
abstract = """A celebrated result of  Håstad established that, for any constant ε>0, it is NP-hard to find an assignment satisfying a (1/|G|+ε)-fraction of the constraints of a given 3-LIN instance over an Abelian group G even if one is promised that an assignment satisfying a (1−ε)-fraction of the constraints exists. Engebretsen, Holmerin, and Russell showed the same result for 3-LIN instances over any finite (not necessarily Abelian) group. In other words, for almost-satisfiable instances of 3-LIN the random assignment achieves an optimal approximation guarantee. In this talk, I will talk about a recent result showing that the random assignment algorithm is still best possible under a stronger promise that the 3-LIN instance is almost satisfiable over an arbitrarily more restrictive group.
Joint work with Alberto Larrauri and Stanislav Živný. <a href='2026-01-28-Butti.pdf'>(slides)</a>"""

[e41]
name = "Filippo Revello"
institution = "KU Leuven"
date = 2026-03-11T15:00:00
location = "B404"
title = "A Holographic Constraint on Scale Separation"
abstract = """The problem of scale separation - i.e. whether String Theory admits AdS vacua where the size of the extra dimensions can be made parametrically smaller than the AdS radius - is an outstanding problem in string phenomenology. Moreover, it is also a fundamental question in Holography and Conformal Field Theory. After a pedagogical introduction covering the connections between these aspects, I will present a new consistency condition for the compatibility of a gravitational effective field theory in AdS with a dual holographic description. The condition amounts to the requirement that certain (properly defined) cubic interactions in the bulk must vanish. Remarkably, the constraint is satisfied for the well-known, scale-separated DGKT vacua in type IIA, thanks to a series of non-trivial cancellations.  I will conclude with a possible bulk interpretation, as well as a future outlook. <a href='2026-03-11-Revello.pdf'>(slides)</a>"""

[e42]
name = "Xenia De La Ossa"
institution = "University of Oxford"
date = 2026-03-18T15:00:00
location = "B404"
title = "Periods, arithmetic and the Hodge structure of Calabi-Yau manifolds"
abstract = """It is well known to mathematicians that there is a deep relationship between the arithmetic of algebraic varieties and their geometry.  
These areas of mathematics have a fascinating connection with physical theories and vice versa.  Examples include Feynman graphs and black hole physics.  There are very many relationships however I will focus on the structure of black hole solutions of superstring theories on Calabi-Yau manifolds. 

The main quantities of interest in the arithmetic context are the numbers of points of the variety, considered as varieties over finite fields, and how these numbers vary with the parameters of the varieties. The generating function for these numbers is the zeta function, about which much is known in virtue of the Weil conjectures. The first surprise, for a physicist, is that the numbers of these points, and so the zeta function, are given by expressions that involve the periods of the manifold.  These same periods determine also many aspects of the physical theory, including the properties of black hole solutions. 

I will discuss a number of interesting topics related to the zeta function, the corresponding L-function, and the appearance of modularity for one parameter families of Calabi-Yau manifolds. I will focus on an example for which the quartic numerator of the zeta function of a one parameter family factorises into two quadrics at special values of the parameter. These special values, for which the underlying manifold is smooth, satisfy an algebraic equation with coefficients in Q, so independent of any particular prime.  The significance of these factorisations is that they are due to the existence of black hole attractor points in the sense of type II supergravity which predict the splitting of the Hodge structure over Q at these special values of the parameter.  Modular groups and modular forms arise in relation to these attractor points, in a way that is familiar to mathematicians as a consequence of the Langland’s Program, but which is a surprise to a physicist.  To our knowledge, the rank two attractor points that were  found together with Mohamed  Elmi and Duco van Straten by the application of  number theoretic techniques, provide the first explicit examples of such attractor points for Calabi-Yau manifolds.  <a href='2026-03-18-de la Ossa.pdf'>(slides)</a>"""

[e43]
name = "Devon Stockall"
institution = "University of Southern Denmark"
date = 2026-03-04T15:00:00
location = "B404"
title = "Continuous categorical gauging and symmetry breaking"
abstract = """In the case of finite group G, the symmetries of 2d G gauge theories can be obtained using fusion categories and "higher representation-theoretic" methods.  However, gauge theories that appear in physics make use of Lie group symmetry.  In this talk, I will give a dictionary between gauge theory and category theory, and show how the fusion-categorical approach to gauge theory can be extended to recover the symmetries of flat continuous gauge theories in arbitrary dimension."""

[e44]
name = "João Faria Martins"
institution = "University of Leeds"
date = 2026-01-14T15:00:00
location = "B404"
title = "A categorification of Kontsevich-Quinn finite total homotopy TQFT with application to TQFTs and once-extended TQFTs derived from discrete higher gauge theory"
abstract = """Kontsevich-Quinn (Finite Total Homotopy) TQFT is a topological quantum field theory defined for any dimension <math><mi>B</mi></math> of space, depending on the choice of a homotopy finite space <math><mi>B</mi></math>. For instance, <math><mi>B</mi></math> can be the classifying space of a finite group or a finite 2-group.
In this talk, I will report on recent joint work with Tim Porter on  once-extended versions of Kontsevich-Quinn TQFT, taking values in the symmetric monoidal bicategory of groupoids, linear profunctors, and natural transformations between linear profunctors. The construction works in all dimensions, yielding (0,1,2)-, (1,2,3)-, and (2,3,4)-extended TQFTs, given a homotopy finite space <math><mi>B</mi></math>. I will show how to compute these once-extended TQFTs when <math><mi>B</mi></math> is the classifying space of a homotopy 2-type, represented by a crossed module of groups. Time permitting, I will address the twice-extended TQFTs also arising, as well as the ensuing representations of motion groups.
References:<br>Faria Martins J, Porter T: "A categorification of Quinn's finite total homotopy TQFT with application to TQFTs and once-extended TQFTs derived from strict omega-groupoids." arXiv:2301.02491 [math.CT]"""

[e45]
name = "Cyril Closset"
institution = "University of Birmingham"
date = 2026-02-25T15:00:00
location = "B404"
title = "Supersymmetric Quantum Mechanics, Defects and Quantum K-theory"
abstract = """I will present two recent results about supersymmetric quantum mechanics with 2 supercharges (1d N=2). First, I will explain new Seiberg-like dualities between 1d SQCD-like theories, which are distinct 1d gauge theories with the same supersymmetric ground states. Then I will discuss the coupling of 1d N=2 quivers to 3d N=2 gauge theories in the context of the GLSM/Quantum K-theory correspondence, explaining how such line defects engineer interesting objects (the so-called Schubert classes) in the quantum K-theory of partial flag varieties. <a href='2026-02-25-Closset.pdf'>(slides)</a>
"""

[e46]
name = "Jonah Stalknecht"
institution = "Charles University"
date = 2026-02-04T16:00:00
location = "B404"
title = "Positive Geometry for Stringy Scalar Amplitudes"
abstract = """The KLT double copy relates open string amplitudes to closed string amplitudes, which provides the string-theoretic version of the more familiar relation Gravity=(Yang-Mills)^2. This relation is mediated by the KLT Kernel. In field theory, this kernel is well-studied, and it is the inverse of a matrix of amplitudes in bi-adjoint scalar theory (BAS). These amplitudes have been central in many recent advances in the field of scattering amplitudes. Crucially, it is known that these amplitudes have a completely geometric description in terms of the ABHY associahedron.

By contrast, much less is known about the string theory KLT kernel. Its inverse defines some α'-completion of BAS amplitudes, and exhibits intrinsically stringy properties. In this talk, I will show that these 'stringy BAS' amplitudes also admit a description from positive geometry. We will see how the stringy features emerge from this geometric description. Furthermore, I will argue that this geometry also contains all pion amplitudes in the Non-Linear Sigma Model, as well as mixed pion/BAS amplitudes. This gives us a first glimpse into how the positive geometry framework can be used to capture truly stringy features, and can be extended beyond the realm of rational functions.

Based on: <a href="https://journals.aps.org/prl/abstract/10.1103/lb5l-twsb">Phys.Rev.Lett. 136 (2026) 1, 011601</a> and <a href="https://arxiv.org/abs/2508.20161">Arxiv: 2508.20161</a> <a href='2026-02-04-Stalknecht.pdf'>(slides)</a>
"""


[e47]
name = "Alex Fink"
institution = "Queen Mary University of London"
date = 2026-02-18T15:00:00
location = "B404"
title = "Matroid subdivisions"
abstract = """One of the dozens of pieces of data one can use to define a matroid is its <em>base polytope</em>, the convex hull of the zero-one vectors encoding the bases. A <em>matroid subdivision</em> is a way to subdivide a matroid polytope into other matroid polytopes. I've been studying matroid subdivisions since my PhD. I suppose I should mention my most recent work on them, with Andy Berget and with Chris Eur and Matt Larson, giving two proofs of a 2005 conjecture of Speyer on the maximal number of cells in a matroid subdivision.

Matroid subdivisions that are obtained by projection from a polytope one dimension larger are in bijection with linear spaces in tropical geometry. More special yet, if <math><mi>K</mi></math> is a field with a non-Archimedean valuation and we have a linear subspace of <math><mi>K</mi><sup><mi>n</mi></sup>, then by applying the valuation to all maximal minors of the associated matrix, we get a matroid subdivision. The parameter spaces for these two constructions are called the <em>Dressian</em> and the <em>tropical Grassmannian</em>.

The Dressian is strictly bigger than the tropical Grassmannian, and both are hard to explicitly compute; even constructing matroid subdivisions in other ways than by applying a valuation is hard. What's remarkable is that both spaces have a "totally positive" part, and the totally positive parts exactly agree. I'm aware the totally positive tropical Grassmannian is of interest in physics due to connections to amplitudes, and I can say a few things I understand to be of interest there (from conversations with Nick Early), but I'm sure you can tell me more!"""

[e48]
name = "Mariana Carrillo Gonzalez"
institution = "Imperial College London"
date = 2026-04-15T15:00:00
location = "B404"
title = "(A)dS Double Copy in Twistor Space"
abstract = """The double copy, which relates gravity to the square of Yang–Mills theory, is usually studied in flat spacetime and is known to hold both for scattering amplitudes and for classical field configurations. In this talk, I will present a new approach to extending these results to maximally symmetric curved spacetimes. The new relations are formulated in twistor space, a complex projective space that encodes solutions to the equations of motion as holomorphic data. First, I will discuss the case of AdS₃, where a double copy structure for bulk to boundary correlators and black hole solutions naturally arises in minitwistor space. Then, I will show how in (A)dS₄ one can construct bulk correlation functions using only twistors, dual twistors, and the infinity twistor as building blocks. The relation to coordinate space arises via nested Penrose transform. The boundary limit of these correlators yields CFT correlators that satisfy the expected Ward identities and obey a simple double copy relation."""


