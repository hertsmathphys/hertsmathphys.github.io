[e51]
name = "Paula Pilatus"
institution = "University of Hamburg"
date = 2026-03-25T15:00:00
location = "B404"
title = "Geometry of EFT positivity constraints"
abstract = """Positivity bounds are theoretical constraints on the Wilson coefficients of an effective field theory. These bounds emerge from the requirement that a given effective field theory must be the low-energy limit of a relativistic quantum theory that satisfies the fundamental principles of unitarity, locality, and causality. In this talk we will discuss how the task of deriving (forward scattering) positivity bounds can be reformulated as the geometric problem of finding the extremal rays of a convex cone of four-tensors with certain symmetries. We will give the solution to this problem for scatterings involving up to three flavors. Finally, we will see how the positivity bounds obtained this way give rise to new constraints that are not already captured by elastic bounds and hence improve the known forward scattering positivity bounds from the literature. Based on arXiv:2508.18165. <a href='2026-03-25-Pilatus.pdf'>(slides)</a>
"""

[e52]
name = "Surya Raghavendran"
institution = "Yale University"
date = 2026-03-12T15:00:00
location = "LF231"
title = "Twisted D-branes and TQFTs valued in Calabi-Yau categories"
abstract = "Recently, Bozec–Calaque–Scherotzke have articulated a noncommutative version of the AKSZ construction, which associates to a smooth Calabi–Yau category, a fully extended TQFT valued in a category of iterated Calabi–Yau cospans. In this talk, I will study a class of examples of such theories which arise in the context of conjectures of Costello and Li, which describe Type II strings in certain Ramond–Ramond backgrounds as topological strings. These TQFTs capture structural features of the BPS physics of D-branes that are universal in Chan–Paton factors. Conjecturally commutative limits of the values of such theories on closed manifolds can sometimes be geometrically quantized to yield algebraic structures with Hall-type products. Examples of this paradigm include CoHAs associated to complex 3-folds, CoHAs attached to local systems on 3-manifolds, and the categorified Hall algebras of Porta–Sala. <a href='2026-03-12-Raghavendran.pdf'>(slides)</a>"

