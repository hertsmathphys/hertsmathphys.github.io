[SEMPS2025]
name = "SEMPS"
institution = "N/A"
date = 2025-04-16T10:30:00
location = "E350"
title = "<a href='https://sites.google.com/view/semps-16-april-2025/home'>22nd South East Mathematical Physics Seminar</a>"
abstract = "To be held 10:30–16:30. See <a href='https://sites.google.com/view/semps-16-april-2025/home'>the seminar page</a> for details."

[a1]
name = "Nivedita <span lang='hi'>निवेदिता</span> / <span lang='pa'>ਨਿਵੇਦਿਤਾ</span>"
institution = "University of Oxford"
date = 2024-11-06T15:00:00
location = "B404"
title = "Towards Models for <math><mo>2‐Hilb</mo></math> and <math><mo>3‐Hilb</mo></math> as targets for functorial field theories"
abstract = "We introduce <math><mi>W</mi><mo>*</mo><mo>-Cat</mo></math>, the bicategory of <math><mi>W</mi><mo>*</mo></math>‐categories, functors and natural transformations and discuss its equivalence with the Morita category of von Neumann algebras (<math><mo>vN2</mo></math>). We highlight some analogies of <math><mi>W</mi><mo>*</mo></math>‐categories with Hilbert spaces. We introduce categorified von Neumann algebras, building up to a definition of a Bicommutant Category and discuss a string calculus on a cylinder. We finally sketch some examples of bicommutant categories associated to chiral <abbr title='conformal field theories'>CFTs</abbr>. <a href='2024-11-06-Nivedita.pdf'>(slides)</a>"
[a2]
name = "<span lang='zh-Latn-pinyin'>Yang‐Hui He</span> <span lang='zh-Hant'>何楊輝</span>"
institution = "University of Oxford; City, University of London"
date = 2024-11-13T15:00:00
location = "B404"
title = "The <abbr title='artificial intelligence'>AI</abbr> mathematician: from physics, to geometry, to number theory"
abstract = "We summarize how <abbr title='artificial intelligence'>AI</abbr> can approach mathematics in three ways: theorem‐proving, conjecture formulation, and language processing. Inspired by initial experiments in geometry and string theory, we present a number of recent experiments on how various standard machine‐learning algorithms can help with pattern detection across disciplines ranging from algebraic geometry to representation theory, to combinatorics, and to number theory. At the heart of the programme is the question: how does <abbr title='artificial intelligence'>AI</abbr> help with mathematical discovery? <a href='2024-11-13-He.pdf'>(slides)</a>"

[a3]
name = "Kymani Tieral Keden Armstrong‐Williams"
institution = "Queen Mary University of London"
date = 2024-09-25T15:00:00
location = "B404"
title = "What can abelian gauge theories teach us about kinematic algebras?"
abstract = "The last twenty years or so have given rise to an interesting relationship (known as the double copy) at the level of scattering amplitudes between non-abelian gauge theories (such as Yang–Mills theory) and quantum gravity theories. After half a decade, this duality was seen to be present in classical physics for exact solutions in classical Yang–Mills theory and general relativity. Arising from the Double Copy, the phenomenon of <abbr title='Bern–Carrasco–Johansson'>BCJ</abbr> duality implies that gauge theories are more complex than previously thought. They are now known to possess an abstract kinematic algebra, mirroring the non-abelian Lie algebra underlying the colour information. Although the nature of the kinematic algebra is known in certain cases, a full understanding is missing for arbitrary non‐abelian gauge theories, such that one typically works outwards from well‐known examples. In this talk, we explore using simpler abelian gauge theories to clarify our understanding of kinematic algebras. We first describe how classes of abelian gauge fields are associated with well‐defined subalgebras of the diffeomorphism algebra. By considering certain special subalgebras, we show that one may construct interacting theories, whose kinematic algebras are inherited from those already appearing in a related abelian theory. This talk will be based on work done in <a href='https://arxiv.org/abs/2401.10750'>arXiv:2401.10750</a>. <a href='2024-09-25-Armstrong‐Williams.pdf'>(slides)</a>"

# Martin Wolf to be scheduled for a double talk, per email chain 7/8 August 2024
[a3a]
name = "<span lang='de'>Martin Wolf</span>"
institution = "University of Surrey"
date = 2024-09-25T14:00:00
location = "B404"
title = "Homotopy Algebra Perspective on Quantum Field Theory"
abstract = "I will review recent progress on understanding perturbative quantum field theory within the realm of homotopy algebras. <a href='2024-09-25-Wolf.pdf'>(slides)</a>"

[a4]
name = "<span lang='cs'>Martina Bártová</span>"
institution = "Trinity College Dublin / <span lang='ga'>Coláiste na Tríonóide, Baile Átha Cliath</span>"
date = 2024-10-02T14:00:00
location = "B404"
title = "Introduction to Quantum Integrability"
abstract = "This talk provides an accessible introduction to quantum integrability, exploring the mathematical structure of integrable quantum systems. We will discuss key concepts such as conserved quantities, exact solvability, and the role of symmetries."

[a4b]
name = "<span lang='sk'>Samuel Valach</span>"
institution = "Trinity College Dublin / <span lang='ga'>Coláiste na Tríonóide, Baile Átha Cliath</span>"
date = 2024-10-02T15:00:00
location = "B404"
title = "Thermal Correlators, Holography and Black Hole Singularity"
abstract = "Black hole singularities in <abbr title='anti de Sitter space'>AdS</abbr> are reflected in the so‐called bouncing geodesics. In the dual <abbr title='conformal field theory'>CFT</abbr> this leads to the bouncing singularities in the thermal correlators. I will explain both sides of this problem and show how these singularities arise from the analytic properties of the stress tensor and its composites in the boundary <abbr title='conformal field theory'>CFT</abbr>."

[a5]
name = "<span lang='de'>Sonja Klisch</span>"
institution = "University of Edinburgh / <span lang='gd'>Oilthigh Dhùn Èideann</span>"
date = 2024-10-09T15:00:00
location = "B404"
title = "A double copy from twistor space"
abstract = "In this talk I will present a new double copy relation at tree level between gauge theory and gravity amplitudes, graded by helicity. <p>Amplitudes in gauge theory and gravity in <math><mn>4</mn><mi>d</mi></math> can be partitioned into sectors according to their external helicity configurations. At tree level there are particularly beautiful expressions for these amplitudes coming from twistor strings known as the <abbr title='Roiban–Spradlin–Volovich–Witten'>RSVW</abbr> (Roiban–Spradlin–Volovich–Witten) formula for gauge theory, and Cachazo–Skinner formula for gravity. At the same time, the double copy gives an explicit relation between gauge theory and gravity amplitudes via <math><mtext>GR</mtext><mo>=</mo><msup><mrow><mo>(</mo><mtext>YM</mtext><mo>)</mo></mrow><mn>2</mn></msup></math>. However, the explicit representation of the Cachazo-Skinner formula as a double copy of the <abbr title='Roiban–Spradlin–Volovich–Witten'>RSVW</abbr> formula has long been unknown. <p>The question answered in this talk is therefore: how do these helicity graded amplitudes manifest the double copy? In the journey there we will discover a new twistorial representation of biadjoint scalars, a way towards the double copy on non‐trivial backgrounds, and the importance of trees. <a href='2024-10-09-Klisch.pdf'>(slides)</a>"


[a6]
name = "<span lang='es'>Mario García‐Fernández</span>"
institution = "<span lang='es'>Instituto de Ciencias Matemáticas, Universidad Autónoma de Madrid</span>"
date = 2024-10-30T15:00:00
location = "B404"
title = "Pluriclosed flow and the Hull–Strominger system"
abstract = "I will overview joint work with Raúl González Molina and Jeffrey Streets in <a href='https://arxiv.org/abs/2408.11674'>arXiv:2408.11674</a> about a natural extension of pluriclosed flow, where the evolution of the hermitian metric on the complex manifold <math><mi>X</mi></math> is further coupled to a hermitian metric on a holomorphic vector bundle <math><mi>V</mi></math> over <math><mi>X</mi></math>. Flow lines are special solutions of the generalized Ricci flow in generalized geometry, and hence of the renormalization group flow in the heterotic sigma model. Using this, we interpret the flow as a version of Donaldson’s Hermitian–Yang–Mills flow in the realm of higher gauge theory. We will comment on the higher regularity structure of the flow and on global existence and convergence results on special backgrounds. If time allows, we will also discuss the relationship to the Hull–Strominger system and, conjecturally, to the geometrization of Reid’s fantasy. <a href='2024-10-30-García.pdf'>(slides)</a>"


[a7]
name = "<span lang='nl'>Pieter Marc Bomans</span>"
institution = "University of Oxford"
date = 2024-11-20T15:00:00
location = "B404"
title = "Unravelling the holomorphic twist"
abstract = "In this talk I will introduce the holomorphic twist for generic 4d <math><mi>𝒩</mi><mo>=</mo><mn>1</mn></math> <abbr title='supersymmetric quantum field theories'>SQFTs</abbr> and discuss the infinite dimensional symmetry enhancement. Consequentially, holomorphically twisted theories come equipped with a variety of mathematical structures. After discussing the relevant structures, I will explain how to relate them to data in the physical theory. In particular. I will discuss how the central charges can be obtained from the ternary bracket. Time permitting, I will finish by demonstrating how the associated <abbr title='vertex operator algebra'>VOA</abbr> can be obtained from the holomorphic twist in the presence of extended supersymmetry. <a href='2024-11-20-Bomans.pdf'>(slides)</a>"


[a8]
name = "<span lang='zh-Latn-pinyin'>Jingxiang Wu</span> (<span lang='zh-Hans'>吴敬祥</span>)"
institution = "University of Oxford"
date = 2024-11-27T15:00:00
location = "B404"
title = "Higher operations in quantum field theories"
abstract = "I will give an overview of higher operations in quantum field theories which control their deformations, (generalized) OPEs, and anomalies. Particular attention is paid to holomorphic-topological theories where we can systematically describe and regularize the Feynman diagrams which compute these higher operations in free and perturbative scenarios, including examples with defects."

[a9]
name = "Niklas Garner"
institution = "University of Oxford"
date = 2024-12-04T15:00:00
location = "B404"
title = " Higgs and Coulomb branches from Superconformal Raviolo Vertex Algebras"
abstract = "The Higgs and Coulomb branches of vacua are central objects in the mathematics of three-dimensional <math><mi>𝒩</mi><mo>=</mo><mn>4</mn></math> supersymmetric quantum field theories and, in particular, three-dimensional mirror symmetry. In this talk, I will describe how these interesting (<math><mn>2</mn></math>‐shifted) Poisson schemes can be extracted by exploiting a natural action of an infinite‐dimensional Lie algebra that is a three‐dimensional analogue of the <math><mi>𝒩</mi><mo>=</mo><mn>2</mn></math> superconformal algebra familiar from two‐dimensional superconformal field theory. This is based off of joint work with S. Raghavendran and B. Williams. <a href='2024-12-04-Garner.pdf'>(slides)</a>"

[a10]
name = "<span lang='hy-Latn'>Karapet Mkrtchyan</span> <span lang='hy'>Կարապետ Մկրտչյան</span>"
institution = "Imperial College London"
date = 2025-01-08T15:00:00
location = "A161"
title = "Democratic approach to <math><mi>𝑝</mi></math>‐form dynamics"
abstract = "We will summarize a recently developed approach to <math><mi>𝑝</mi></math>‐form dynamics, which allows for a democratic (treating electric and magnetic degrees of freedom on an equal footing) Lagrangian formulation for electrodynamics and generalization to (chiral) <math><mi>𝑝</mi></math>‐forms, including arbitrary abelian interactions. In particular, a Lagrangian for arbitrary duality‐symmetric non‐linear electrodynamics in <math><mn>3</mn><mo>+</mo><mn>1</mn></math> dimensions is derived where both <math><mi mathvariant='normal'>SO</mi><mo>(</mo><mn>2</mn><mo>)</mo></math> duality and Lorentz covariance are manifest. Democratic formulation for (type Ⅱ) <abbr title='supergravity'>SUGRA</abbr> in 10d and 11d is also achieved. We also present a simple derivation of this formulation from a topological theory in one higher dimension. Time permitting, more discussion on an ongoing work on generalizations of these results will be provided. <a href='2025-01-08-Mkrtchyan.pdf'>(slides)</a>"

[a11]
name = "<span lang='it'>Erica Bertolini</span>"
institution = "Dublin Institute for Advanced Studies / <span lang='ga'>Institiúid Ard‐Léinn Bhaile Átha Cliath</span>"
date = 2025-01-15T15:00:00
location = "B400"
title = "Fractons: a new covariant gauge field theory"
abstract = "The concept of a fracton quasiparticle has recently emerged in many areas of physics, from mathematical physics to condensed matter and quantum information, unified by the general feature of restricted mobility.<p>In this seminar I will introduce the basic notion of fracton quasiparticles, focussing on the gauge field theory construction developed in Pretko's original papers [1604.05329,1606.08857], mentioning the physical applications in elasticity theory and connections with gravitational models. In the second part of the seminar I will then step into the building of a covariant model for fractons in which a strong relation with Linearized Gravity naturally emerges. The fracton phenomenology is reproduced from first principles of <abbr title='quantum field theory'>QFT</abbr> through a symmetry‐based approach, opening the doors to a new class of covariant gauge field theories. This formulation can be generalized to any spacetime dimension, allowing for instance the study of lower‐dimentional fracton models and showing relations with some condensed matter systems. <a href='2025-01-15-Bertolini.pdf'>(slides)</a>"

[a12]
name = "<span lang='fa-Latn'>Mehran Jalali Farahani</span> <span lang='fa'>مهران جلالی فراهانی</span>"
institution = "Heriot‐Watt University / <span lang='gd'>Oilthigh Heriot‐Watt</span>, Maxwell Institute for Mathematical Sciences"
date = 2024-10-16T15:00:00
location = "B404"
title = "Principal Lie groupoid bundles with connection (and a bit beyond)"
abstract = "In this talk, I present our recent work towards general theory of higher principal bundles with connection. In particular, we developed the notion of principal groupoid‐bundles with connection using a new framework that is suitable for generalization. In this setup, principal bundles with connection are principal bundles without connection in a different category, namely the category of NQ‐manifolds. <a href='2024-10-16-Jalali-Farahani.pdf'>(slides)</a>"

[a13]
name = "<span lang='ru-Latn'>Fedor Leonidovich Levkovich‐Maslyuk</span> <span lang='ru'>Фёдор Леони́дович Левко́вич‐Маслю́к</span>"
institution = "City, University of London"
date = 2025-01-29T15:00:00
location = "C152"
title = "Yangian symmetry, <abbr title='Gelfand–Kapranov–Zelevinsky'>GKZ</abbr> equations and integrable Feynman graphs"
abstract = "We extend the powerful property of Yangian invariance to a new large class of conformally invariant multi-loop Feynman integrals. This leads to new highly constraining differential equations for them, making integrability visible at the level of individual Feynman graphs. Our results apply to planar Feynman diagrams in any spacetime dimension dual to an arbitrary network of intersecting straight lines on a plane (Baxter lattice), with propagator powers determined by the geometry. The graphs we consider determine correlators in the recently proposed “loom” fishnet <abbr title='conformal field theories'>CFTs</abbr>. The construction unifies and greatly extends the known special cases of Yangian invariance to likely the most general family of integrable scalar planar graphs. We also relate these equations in certain cases to famous GKZ (Gelfand–Kapranov–Zelevinsky) hypergeometric operators, opening the way to using new powerful solution methods. <a href='2025-01-29-Levkovich-Maslyuk.pdf'>(slides)</a>"

[a14]
name = "<span lang='pt'>Catarina Carvalho</span>"
institution = "University of Hertfordshire"
date = 2024-10-23T15:00:00
location = "B404"
title = "Digraphs with caterpillar duality"
abstract = "We search for the class of digraphs whose obstruction sets, in the digraph homomorphism problem, consist of caterpillars. The conjecture being that this class of digraphs should be the same as the class of digraphs that are preserved by majority and set function polymorphisms. This is work in progress. <a href='https://caterpillardualitysemigroupseminar.netlify.app/'>(slides)</a>"

[a15]
name = "Siani Smith"
institution = "Loughborough University"
date = 2025-02-05T15:00:00
location = "B400"
title = "A complexity framework for forbidden subgraphs"
abstract = "A common direction in algorithmic graph theory is to investigate the complexity of hard problems restricted to specific classes of graphs. This raises the question of whether large sets of such problems can be explained by common problem conditions. For a set of graphs <math><mi>ℋ</mi></math>, the class of <math><mi>ℋ</mi></math>‐subgraph‐free graphs is the class of all graphs not containing any graph from <math><mi>ℋ</mi></math> as a subgraph. We present a framework to classify the complexity of certain problems on <math><mi>ℋ</mi></math>‐subgraph‐free graph classes. In particular, we give a meta‐theorem classifying the complexity of problems satisfying three conditions."

[a16]
name = "Lewis Topley"
institution = "University of Bath"
date = 2025-02-19T15:00:00
location = "B400"
title = "Twisted Yangians and even finite <math><mi>W</mi></math>‐algebras in classical types"
abstract = " I will report on a work in progress, join with Kang Lu, Yang‐ning Peng, Lukas Tappeiner and Weiqiang Wang, which connects the two algebras in the title of this talk. Finite <math><mi>W</mi></math>‐algebras are an interesting family of algebras, built from a complex semisimple Lie algebra and a nilpotent element by a process of quantum Hamiltonian reduction. Twisted Yangians are a family of algebras of a totally different pedigree. They were introduced by Olshanskii in order to quantize the twisted current algebra coming from symmetric pairs, and they arise as coideal subalgebras of the Yangians studied extensively by Drinfeld. A famous theorem of Brundan and Kleshchev states that the finite <math><mi>W</mi></math>‐algebras of type A arise as quotients of the (shifted) Yangian associated to general linear algebras. For finite W-algebras associated to even nilpotent elements in types B, C, D it turns out that the (shifted) twisted Yangians are the correct replacement. Our work generalises results of Brown which dealt with the rectangular case. I will attempt to make the talk as accessible as possible."

[a18]
name = "<span lang='it'>Marco Billò</span>"
institution = "<span lang='it'>Università degli Studi di Torino</span>"
date = 2025-03-19T15:00:00
location = "C152"
title = "Localization in <math><mi>𝒩</mi><mo>=</mo><mn>2</mn></math> theories with non-zero <math><mi>𝛽</mi></math>-function"
abstract = "Localization is a powerful technique that simplifies drastically  the evaluation of the path integrals defining certain protected observables in <math><mi>𝒩</mi><mo>=</mo><mn>2</mn></math> supersymmetric theories in <math><mi>𝑑</mi><mo>=</mo><mn>4</mn></math>. To apply localization, the theory must be defined on a compact space like <math><msub><mi>𝑆</mi><mn>4</mn></math>. For theories which are conformal also at the quantum level, the results on <math><msub><mi>𝑆</mi><mn>4</mn></math> can be mapped onto flat space. In recent works, we have been investigating the situation for theories with a non‐zero <math><mi>𝛽</mi></math> function. Naively one would expect the conformal anomaly to prevent the extension of localization results on <math><msub><mi>𝑆</mi><mn>4</mn></math> to flat space. However, we show that this is actually the case within in a well specified perturbative regime. We perform explicit checks with  flat space Feynman diagrams up to order <math><msup><mi>𝑔</mi><mn>6</mn></msup></math>  for observables like circular Wilson loops and correlators of chiral operators."

[a17]
name = "<span lang='es'>Víctor Carmona Sánchez</span>"
institution = "<span lang='de'>Max‐Planck‐Institut für Mathematik in den Naturwissenschaften Leipzig</span>"
date = 2025-02-12T15:00:00
location = "B400"
title = "The <math><mo>∞</mo></math>‐equivalence between AQFTs and Factorization Algebras"
abstract = "Quantum Field Theory (QFT) is an exciting yet elusive domain within mathematics and physics. Despite the lack of rigorous foundations to support many advancements made by physicists, mathematicians have engaged in a fruitful endeavor to formalize QFTs. In current times, we find ourselves at a crossroads: while we still lack the comprehensive techniques and language to fully grasp QFT, numerous distinct axiomatic frameworks are attempting to capture its essence. A natural question arises: how are these approaches connected? This talk will focus on two such frameworks: Algebraic Quantum Field Theories (AQFTs) and Factorization Algebras (FAs). The significance of these frameworks is motivated, among other things, by rigorous programs led by Fredenhagen–Rejzner and Costello–Gwilliam to construct perturbative QFTs using AQFTs and FAs, respectively. Recent contributions from Gwilliam–Rejzner and Benini–Musante–Schenkel establish a relationship between these two programs, vaguely speaking. At a more structural level, Benini–Perin–Schenkel have established an equivalence of 1-categories between specific subcategories of AQFTs and (time‐orderable pre‐)FAs. The goal of this talk is to present our proof of an even broader equivalence between <math><mo>∞</mo></math>‐categories of AQFTs and tpFAs.<p>This talk is based on <a href='https://arxiv.org/abs/2412.07318'>arXiv:2412.07318</a> and ongoing joint work with M. Benini, A. Grant‐Stuart and A. Schenkel."

[a19]
name = "Rachel Shaw"
institution = "University of Southampton"
date = 2025-02-26T15:00:00
location = "C152"
title = "Power and Mobility Optimisation in a Multi‐Agent Game"
abstract = "In the dynamic setting of competitive multi‐agent systems, strategic decision‐making and resource allocation are key to achieving optimal outcomes. This research explores the optimisation of power and mobility in adversarial multi‐agent games, modelled as a Nash zero‐sum framework. By utilising advanced game‐theoretic methods, we analyse the interactions between the agents of two teams of autonomous vehicles, with decision variables encompassing communication, interference, and movement. The model incorporates power, movement, and minimum distance constraints, employing fixed‐point formulations and block‐descent algorithms to determine equilibrium strategies. Additionally, we introduce the concept of team preferences and discuss ongoing work on individual agent preference."


[a20]
name = "<span lang='it'>Tancredi Schettini Gherardini</span>"
institution = "Queen Mary University of London"
date = 2025-01-22T15:00:00
location = "B404"
title = "Exotic spheres from different angles"
abstract = "In this talk, I will discuss different mathematical properties of exotic (<math><mn>7</mn></math>‐)spheres and their implications in physics. Namely, I will cover some known facts as well as recent results regarding:<ul> <li>The geometry of Milnor’s bundles and a number of analytic results obtained in <a href='https://arxiv.org/abs/2309.01703'>arXiv:2309.01703</a> (<abbr title='Journal of High Energy Physics'>J. High Energ. Phys.</abbr> 2023, 100) and <a href='https://arxiv.org/abs/2410.01909'>arXiv:2410.01909</a>; I will discuss the relevance of these results in the context of supergravity. <li>The differentiable structure of exotic spheres together with its conjectured implications in general relativity and shock waves (work in progress). <li>A numerical technique for finding and approximating Einstein metrics, to be applied eventually to the case of exotic spheres, which is based on state‐of‐the‐art machine learning tools (work in progress with Edward Hirst and Alex Stapleton). The possible uses of this numerical scheme in (super)gravity theories are also discussed.</li></ul> <p><a href='2025-01-22-Schettini.pdf'>(slides)</a></p>"

[a21]
name = "<span lang='de'>Markus Upmeier</span>"
institution = "University of Aberdeen / <span lang='gd'>Oilthigh Obar Dheathain</span>"
date = 2025-03-26T15:00:00
location = "SP3006"
title = "<abbr title='Topological quantum field theories'>TQFTs</abbr> and <abbr title='Atiyah–Patodi–Singer'>APS</abbr> index theory"
abstract = "Beginning with simple examples, my talk will introduce a new approach to understanding Atiyah–Patodi–Singer indices for manifolds with boundary that casts them within the framework of an associated topological quantum field theory. The main result interprets these indices in terms of the determinant line bundle of the induced differential operator over the boundary and proves a gluing property. Based on <a href='https://arxiv.orb/abs/2312.06818'>arXiv:2312.06818</a>."

[a22]
name = "<span lang='de-at'>Vera Posch</span>"
institution = "Trinity College Dublin / <span lang='ga'>Coláiste na Tríonóide, Baile Átha Cliath</span>"
date = 2025-04-02T15:00:00
location = "C152"
title = "All <math><mn>4</mn><mo>×</mo><mn>4</mn></math> solutions of the quantum Yang–Baxter equation"
abstract = "In this talk I get to tell you about my latest paper with my PhD advisor Marius de Leeuw in which we complete the classification of <math><mn>4</mn><mo>×</mo><mn>4</mn></math> solutions of the Yang–Baxter equation. Regular solutions were recently classified and in this paper we found the remaining non‐regular solutions. I will present some of these new solutions, then consider regular and non‐regular Lax operators and their relation to the quantum Yang–Baxter equation.  I will show that for regular solutions there is a correspondence, which is lost in the non‐regular case. In particular, we will see that the non‐regular Lax operators whose <math><mi>R</mi></math>‐matrix from the fundamental commutation relations is regular but does not satisfy the Yang–Baxter equation. These <math><mi>R</mi></math>‐matrices satisfy a modified Yang–Baxter equation instead."

[a23]
name = "Duncan Laurie"
institution = "University of Edinburgh / <span lang='gd'>Oilthigh Dhùn Èideann</span>"
date = 2025-04-30T15:00:00
location = "E350"
title = "Tensor products, <math><mi>q</mi></math>‐characters and <math><mi>R</mi></math>‐matrices for quantum toroidal algebras"
abstract = "<p>Quantum toroidal algebras are the ‘double affine’ objects within the quantum setting. In particular, they contain — and are generated by — horizontal and vertical quantum affine subalgebras.<p>These quantum toroidal algebras are not known to possess a coproduct, but do have a topological coproduct mapping to a completion of the tensor square. However, this still fails to produce a tensor product on the category of integrable modules due to the presence of infinite sums.<p>In this talk, after introducing the quantum toroidal algebras, I shall explain how to overcome these issues — namely, we’ll obtain well‐defined tensor products satisfying various nice properties. (For example, there are compatibilities with both Drinfeld polynomials and <math><mi>q</mi></math>‐characters, as well as toroidal <math><mi>R</mi></math>‐matrices that solve the Yang–Baxter equation.) <a href='2025-04-30-Laurie.pdf'>(slides)</a>"

[a24]
name = "John D. P. Evans"
institution = "University of Hertfordshire"
date = 2025-04-23T15:00:00
location = "B400"
title = "Syzygy Modules and Wall’s <math><mi>D</mi><mo>(</mo><mn>2</mn><mo>)</mo></math>-problem"
abstract = "I will first give a brief historical overview of the <math><mi>D</mi><mo>(</mo><mn>2</mn><mo>)</mo></math>‐problem before explaining the importance of syzygy modules in solving this problem in low‐dimensional topology. We will see how a group structure is easily obtained, and I will conclude by discussing the syzygy modules for dihedral groups, using these to provide an affirmative answer for the <math><mi>D</mi><mo>(</mo><mn>2</mn><mo>)</mo></math>‐problem, in this case. <a href='2025-04-23-Evans.pdf'>(slides)</a>"

[a25]
name = "<span lang='it'>Filippe Fila‐Robattino</span>"
institution = "<span lang='it'>Scuola Internazionale Superiore di Studi Avanzati</span>"
date = 2025-03-05T15:00:00
location = "LC100"
title = "<abbr title='Batalin–Vilkovisky'>BV</abbr> analysis of <math><mi>𝒩</mi><mo>=</mo><mn>1</mn></math> <math><mi>𝐷</mi><mo>=</mo><mn>4</mn></math> Supergravity in the first order formalism"
abstract = "The <abbr title='Batalin–Vilkovisky'>BV</abbr> formalism was first introduced to deal with the perturbative quantization of gauge theories, generalizing the <abbr title='Becchi–Rouet–Stora–Tyutin'>BRST</abbr> procedure. It is well known that, in the case of supergravity, the supersymmetry transformations close only on‐shell, leading to a rank‐<math><mn>2</mn></math> (i.e. quadratic in the anti‐fields) <abbr title='Batalin–Vilkovisky'>BV</abbr> action. <p>After a short introduction to the <abbr title='Batalin–Vilkovisky'>BV</abbr> formalism, I will present the fully covariant <abbr title='Batalin–Vilkovisky'>BV</abbr> analysis of <math><mi>𝒩</mi><mo>=</mo><mn>1</mn></math>, <math><mi>𝐷</mi><mo>=</mo><mn>4</mn></math> supergravity in the first order formalism, where the spin connection is treated as a dynamical field. <p>If time allows it, I will highlight the advantages of such description in the presence of boundaries, where one can expect to obtain a <abbr title='Batalin–Fradkin–Vilkovisky'>BFV</abbr> structure describing the boundary theory. <a href='2025-03-05-Fila‐Robattino.pdf'>(slides)</a>"

[a26]
name = "Georgios Papadopoulos <span lang='el'>Γεώργιος Παπαδόπουλος</span>"
institution = "King’s College London"
date = 2025-03-12T15:00:00
location = "B404"
title = "Scale and conformal invariance in <math><mn>2</mn></math>‐dimensional sigma models"
abstract = "I shall demonstrate that all scale invariant two‐dimensional sigma models with compact target space are conformally invariant. The proof relies on techniques developed by Perelman for the proof of the Poincaré conjecture that I shall review."

